<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – QMAX SYSTEMS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        min-height: 100vh;
      }

      .container {
        width: 100%;
        min-height: 100vh;
        background-image: url("image/qmax-bg.jpeg");
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container::before {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 0;
      }

      .login-box {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        padding: 48px 40px 40px;
        border-radius: 16px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      }

      .login-logo {
        text-align: center;
        margin-bottom: 8px;
      }

      .login-logo span {
        font-size: 13px;
        color: rgba(255,255,255,0.5);
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .login-box h2 {
        color: #ffffff;
        text-align: center;
        margin-bottom: 32px;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .login-field {
        margin-bottom: 18px;
      }

      .login-field label {
        display: block;
        color: rgba(255,255,255,0.7);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .login-field input {
        width: 100%;
        padding: 13px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.2);
        outline: none;
        font-size: 15px;
        background: rgba(255, 255, 255, 0.1);
        color: #ffffff;
        transition: border 0.2s, background 0.2s;
      }

      .login-field input::placeholder {
        color: rgba(255,255,255,0.35);
      }

      .login-field input:focus {
        border-color: #ff5945;
        background: rgba(255, 255, 255, 0.15);
      }

      .login-btn {
        width: 100%;
        padding: 14px;
        background: #ff5945;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: opacity 0.2s, transform 0.1s;
      }

      .login-btn:hover { opacity: 0.9; }
      .login-btn:active { transform: scale(0.98); }

      .error-msg {
        color: #ffaaaa;
        font-size: 13px;
        text-align: center;
        margin-top: 14px;
        min-height: 18px;
      }

      @media (max-width: 480px) {
        .login-box {
          padding: 36px 24px 32px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="login-box">
        <div class="login-logo">
          <span>QMAX SYSTEMS</span>
        </div>
        <h2>Welcome Back</h2>

        <div class="login-field">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" />
        </div>
        <div class="login-field">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
        </div>
        <button class="login-btn" onclick="login()">Login</button>
        <div class="error-msg" id="error-msg"></div>
      </div>
    </div>

    <script>
      if (localStorage.getItem("qmax_token")) {
        fetch("/api/auth/verify", {
          headers: { Authorization: "Bearer " + localStorage.getItem("qmax_token") }
        }).then(r => { if (r.ok) window.location.href = "/todo.html"; });
      }

      async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("error-msg");

        if (!username || !password) {
          errorMsg.textContent = "Please enter both username and password.";
          return;
        }

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (res.ok) {
            localStorage.setItem("qmax_token", data.token);
            window.location.href = "/todo.html";
          } else {
            errorMsg.textContent = data.error || "Login failed.";
          }
        } catch (err) {
          errorMsg.textContent = "Cannot connect to server. Is it running?";
        }
      }

      document.addEventListener("keydown", e => {
        if (e.key === "Enter") login();
      });
    </script>
  </body>
</html>
